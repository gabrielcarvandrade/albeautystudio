aboutText1: "O AL Beauty Studio nasceu da paixão de Ana Laura Fagundes pelo autocuidado e pela transformação pessoal. Aos 20 anos, Ana Laura fundou um espaço com um propósito claro: fazer com que cada cliente se sentisse acolhida, segura e valorizada."
aboutText2: "A filosofia do studio vai além dos procedimentos. Acreditamos que detalhes pequenos têm o poder de transformar a forma como cada mulher se enxerga. Por isso, cada atendimento começa com uma consulta personalizada sobre estilo, rotina e expectativas."
aboutText3: "Nossa especialidade está em resultados que parecem naturais — cílios que realçam sem pesar, sobrancelhas que seguem o contorno natural, e unhas que contam a sua história."
founderQuote: "Acredito que cada cliente merece se sentir única — não apenas bonita."
